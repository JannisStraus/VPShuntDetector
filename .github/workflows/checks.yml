name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      AGENT_TOOLSDIRECTORY: ${{ runner.workspace }}/_tool
      CLOUD_TEST_TOKEN: ${{ secrets.CLOUD_TEST_TOKEN }}
      DEVICE: ${{ secrets.DEVICE }}
      RUNNER_TOOL_CACHE: ${{ runner.workspace }}/_tool

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Prepare tool cache
        run: mkdir -p "$RUNNER_TOOL_CACHE"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: arm64

      - name: Install dependencies
        run: uv sync --dev --python "$(which python)"

      - name: Run pre-commit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: uv run pre-commit run -a --show-diff-on-failure

      - name: Run pytest with coverage
        run: uv run pytest

      - name: CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          uv run vpshuntdetector -h
          uv run vpshuntdetector -v

      - name: Send coverage results
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
