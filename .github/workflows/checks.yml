name: Checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: self-hosted
    env:
      CLOUD_TEST_TOKEN: ${{ secrets.CLOUD_TEST_TOKEN }}
      DEVICE: ${{ secrets.DEVICE }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync -q --dev

      - name: Run pre-commit
        run: uv run pre-commit run -a --show-diff-on-failure

      - name: Run pytest with coverage
        run: uv run pytest

      - name: CLI smoke test
        shell: bash
        run: |
          set -euo pipefail

          TMP_DIR="$(mktemp -d)"
          ZIP_PATH="$TMP_DIR/examples.zip"

          curl -fsSL "https://cloud.uk-essen.de/d/${CLOUD_TEST_TOKEN}/files/?p=/examples.zip&dl=1" -o "$ZIP_PATH"
          unzip -q "$ZIP_PATH" -d "$TMP_DIR"

          uv run vpshuntdetector \
          -i "$TMP_DIR/input" \
          -o "$TMP_DIR/output" \
          --instructions "$TMP_DIR/manufacturer" \
          -d "${DEVICE:-cpu}"

          rm -rf "$TMP_DIR"

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
