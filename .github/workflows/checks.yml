name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: [self-hosted, macOS, ARM64]
    env:
      CLOUD_TEST_TOKEN: ${{ secrets.CLOUD_TEST_TOKEN }}
      DEVICE: ${{ secrets.DEVICE }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          architecture: arm64

      - name: Install dependencies
        run: uv sync --dev

      - name: Export requirements.txt
        run: |
          uv export \
            --format requirements.txt \
            --locked \
            --no-emit-local \
            --no-all-extras \
            --no-hashes \
            --output-file requirements.txt

      - name: Run pre-commit
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: uv run pre-commit run -a --show-diff-on-failure

      - name: Run pytest with coverage
        run: uv run pytest

      - name: CLI smoke test
        shell: bash
        run: |
          set -euo pipefail
          uv run vpshuntdetector -h
          uv run vpshuntdetector -v

      - name: Commit updated requirements.txt
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python-version == '3.13'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- requirements.txt; then
            echo "requirements.txt is up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git commit -m "chore: update requirements.txt"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"

      - name: Send coverage results
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
