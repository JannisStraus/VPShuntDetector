version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    versioning-strategy: lockfile-only
    schedule:
      interval: "monthly"
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
